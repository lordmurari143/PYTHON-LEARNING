<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFlix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">MyFlix</div>
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">TV Shows</a>
      <a href="#">Movies</a>
      <a href="#">New & Popular</a>
      <a href="#">My List</a>
    </nav>
    <div class="profile">
      <img src="https://i.pravatar.cc/40" alt="User" />
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Stranger Things</h1>
      <p>A thrilling series about mystery, friendship, and monsters.</p>
      <div class="hero-buttons">
        <button class="btn play">▶ Play</button>
        <button class="btn info">ℹ More Info</button>
      </div>
    </div>
  </section>

  <!-- Movie Rows -->
  <section class="movies">
    <h2>Popular on MyFlix</h2>
    <div class="movie-row">
      <img src="https://image.tmdb.org/t/p/w300/8Y43POKjjKDGI9MH89NW0NAzzp8.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/rjkmN1dniUHVYAtwuV3Tji7FsDO.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/w7pWcLaYQkbtRUn99Q1mREwF6tZ.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg" alt="">
    </div>
  </section>

  <section class="movies">
    <h2>Trending Now</h2>
    <div class="movie-row">
      <img src="https://image.tmdb.org/t/p/w300/xOMo8BRK7PfcJv9JCnx7s5hj0PX.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/fiVW06jE7z9YnO4trhaMEdclSiC.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/4XM8DUTQb3lhLemJC51Jx4a2EuA.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/1BqX34aJS5J8PefVnQSfQIEPfkl.jpg" alt="">
      <img src="https://image.tmdb.org/t/p/w300/sv1xJUazXeYqALzczSZ3O6nkH75.jpg" alt="">
    </div>
  </section>

  <footer class="footer">
    <p>© 2025 MyFlix. All Rights Reserved.</p>
  </footer>
</body>
</html>
